          - generic [ref=e469]: Validation in ERPNext is primarily used to enforce rules and constraints on data before it's saved or processed. For instance, the system checks selling prices to make sure they meet certain criteria [2]. There's also validation around stock reservation status, which is controlled by a setting in Stock Settings [1]. These checks are applied during processes such as creating or modifying Sales Orders, ensuring data integrity and business rules. The documented fields in the Sales Order doctype include various identifiers such as customer address, billing address, and payment details [5]. However, the actual validation logic often occurs only when specific conditions are met or during specific actions like saving a Sales Order [2]. For example, a validation rule exists that ensures selling rate is not below the valuation rate for manufactured items [2], but this validation is only triggered under specific circumstances, like when selling price validation settings are enabled [2]. There's a discrepancy between what the documentation lists and how validations actually operate in code; for example, the validation logic isn't always explicitly outlined in the doctype definition but is instead embedded in methods or triggered conditions [2]. In summary, the actual behavior of validations often differs from their documented structure. While some validation rules are explicitly defined in the doctype (e.g., through field validations), others rely on conditional checks that are implemented in code rather than being explicitly documented [2].
