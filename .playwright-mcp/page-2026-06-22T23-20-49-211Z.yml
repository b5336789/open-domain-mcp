          - generic [ref=e480]: "@frappe.whitelist() def make_production_plan(source_name: str, target_doc: str | Document | None = None): sales_order = frappe.get_doc(\"Sales Order\", source_name) production_plan = frappe.new_doc( \"Production Plan\", company=sales_order.company, get_items_from=\"Sales Order\", posting_date=nowdate(), ) open_so = [data.name for data in get_sales_orders(production_plan)] if sales_order.name not in open_so: frappe.throw(_(\"Sales Order {0} is not available for production\").format(sales_order.name)) production_plan.append( \"sales_orders\", { \"sales_order\": sales_order.name, \"sales_order_date\": sales_order.transaction_date, \"customer\": sales_order.customer, \"grand_total\": sales_order.base_grand_total, }, ) production_plan.get_items() if not production_plan.get(\"po_items\"): frappe.throw(_(\"Sales Order {0} is not available for production\").format(sales_order.name)) return production_plan"
