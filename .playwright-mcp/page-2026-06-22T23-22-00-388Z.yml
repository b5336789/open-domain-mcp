          - generic [ref=e554]: When a Sales Order is submitted in ERPNext, it becomes an official record of the customer's order. The system validates the data and ensures that all required fields are filled correctly [6]. Once submitted, certain actions become restricted – for instance, if a Sales Invoice or Delivery Note has already been created and submitted linked to that Sales Order, the system prevents cancellation of the Sales Order to maintain data integrity [2][3]. Additionally, while submitting a Sales Order triggers validation checks (such as ensuring selling rates aren't below valuation rates), these validations are conditional and may depend on specific settings or conditions [6]. The system also supports linking the Sales Order with production planning and work orders, depending on item types [4]. However, specific outcomes like status changes or triggers for other documents (e.g., automatic creation of delivery notes) are not explicitly detailed in the provided sources beyond validation and restrictions on cancellation. The submission process itself ensures data integrity through validations but does not trigger automatic creation of related documents such as delivery notes or production plans unless explicitly triggered by the user or system logic [1][5].
