          - generic [ref=e336]: "The OpenDomainMcp CLI enables users to interact with the system via terminal commands, offering functions such as ingesting files, searching knowledge bases, and asking questions using an LLM [1]. It supports standard operations like ingestion (`ingest`, `search`, `ask`) and management commands such as stats, clear, and collections [4]. According to the README, the CLI is designed as a unified interface for interacting with the ingestion pipeline and retrieval system. However, while the documentation claims that search works through hybrid retrieval by default (combining lexical and vector modes), this functionality might not always be enabled as stated in the usage examples [7]. Specifically, setting `ODM_SEARCH_MODE=vector` disables lexical search entirely [7], which contradicts the claim that hybrid search is default. Additionally, the CLI's interaction with MCP and web interfaces is described as consistent across surface areas, yet there are nuances in how filters like `--kind` and `--language` filter documents based on metadata stored during ingestion [5]. These filters relate to Chroma queries, but the documentation does not detail how they map to specific fields in the store or how these are indexed [5]. Furthermore, while the same pipeline runs across all surfaces, the CLI specifically doesn't support streaming responses from `ask` like web or MCP might [4]."
