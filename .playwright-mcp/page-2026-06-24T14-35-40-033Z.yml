          - generic [ref=e351]: "The OpenDomainMcp platform enables users to build and manage domain knowledge bases from code or documents. It supports three interfaces: a CLI, MCP server, and web dashboard that all interact with the same underlying knowledge store. The platform supports hybrid search using both vector and BM25 methods, with optional dense-only mode via `ODM_SEARCH_MODE=vector` [6]. Data is chunked using AST analysis for code and recursive text splitting for documents, with chunks enriched before embedding to support semantic search [5]. According to documentation, the web dashboard offers six distinct pages including ingesting files with live progress updates and browsing stored chunks [4, 7]. The MCP server exposes tools for ingestion, search, and retrieval that support filtering by kind, language, symbol, source, and collection name [3]. The CLI offers commands for ingest, search, and asking questions via an AI model with citation support [2]. There is a mismatch between documented functionality and actual implementation. While the documentation states that the web UI supports live progress updates for ingestion, there is no direct evidence in code or configuration files that such functionality exists as described. Additionally, while the MCP server is documented to support filtering options like `language`, `symbol`, and `source` in search, there's no code evidence indicating these filters are implemented or even fully integrated. In fact, some configuration options like `ODM_RERANK_ENABLED` appear to be documented but absent from the actual code, indicating potential inconsistencies between documentation and implementation. The system uses Claude models for knowledge extraction and embedding, with settings such as `ODM_EXTRACTION_MODEL` set to `claude-sonnet-4-6` as default [3]. However, the actual implementation uses `claude-sonnet-4-6` as an annotation model but not for the actual extraction step [3]. This results in a mismatch between what is documented versus how it's applied. Furthermore, the web dashboard and MCP server share several features but do not fully implement all documented capabilities like the live SSE progress stream or full filter support in search queries [2, 4]."
