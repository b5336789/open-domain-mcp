          - generic [ref=e321]: "API keys in OpenDomain MCP serve to control access to its endpoints, enabling multi-tenant usage and role-based access control. The configuration allows defining keys with associated roles and views, where a key can be restricted to specific view names or granted access to all views when set as `*` [3]. These keys are parsed from a comma-separated string format like `key:role:view1|view2` [4]. They are intended to be read from environment variables, making them non-editable via the UI and not designed for runtime changes [1]. To enable API key authentication, `ODM_AUTH_ENABLED` must be set to true and the `API_KEYS` environment variable provided with a comma-separated list of keys [1]. The API key validation ensures that each entry follows the required format and includes valid view names defined in `VIEW_NAMES` [4]."
