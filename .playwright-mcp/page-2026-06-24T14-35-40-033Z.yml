          - generic [ref=e366]: OpenDomainMcp provides hybrid search that combines lexical and dense retrieval methods, offering users a choice between hybrid (default) or vector-only modes. The system supports filtering by kind, language, symbol, and source with optional re-ranking using cross-encoder models. The hybrid approach uses BM25 for lexical search and Chroma-based dense retrieval, with results fused using reciprocal rank fusion (RRF) to prioritize relevant documents [1][5]. Documented behavior suggests hybrid search integrates lexical and dense retrieval paths, with lexical results being re-ranked using a cross-encoder model when enabled. The system uses reciprocal rank fusion with a parameter k=60 to merge results from both retrieval methods, ensuring that relevant lexical and dense hits are ranked together [5]. However, the actual implementation behavior diverges from documented expectations. While documentation mentions re-ranking as an optional cross-encoder feature, the actual implementation uses a cosine distance score for lexical-only hits with a default of 0.0, which means lexical results receive no real re-ranking and instead rely on cosine distance scoring [5][3]. In hybrid mode, lexical hits are filtered through where clauses and then passed to the fusion step without any re-ranking applied in that path [5]. The document also states that the search functionality supports filtering through where clauses and source substring filtering, but actual behavior shows that these filters are used to filter lexical hits before fusion rather than being applied directly during the dense retrieval phase [3]. Additionally, there's a mismatch in how source filtering is implemented; while the documentation mentions filtering by source substring, it's actually handled via post-processing rather than in-database filtering [3].