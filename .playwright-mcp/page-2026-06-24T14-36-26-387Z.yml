            - heading "Ingestion Pipeline" [level=2] [ref=e857]
            - generic [ref=e858]: ingestion pipeline
          - generic [ref=e859]: "The ingestion pipeline in openDomainMcp processes files and directories through five stages: load, split, extract, embed, and store. It supports various file types including code (AST-based chunking) and documents (recursive text splitting). The pipeline can run offline in tests with mocked dependencies, allowing for full test coverage without external services [1]. The documentation describes the pipeline as a sequence of steps: load → split → extract → embed → store, with progress callbacks for streaming updates [2]. The pipeline is designed to be extensible by injecting dependencies like extractors and embedders, which allows swapping implementations for testing or different environments [1]. There's a gap between what the docs describe and actual behavior: while the documentation hints at dependency injection for components like embedders, it doesn't explicitly discuss how the pipeline orchestrates these injected dependencies or whether they can be swapped at runtime. Additionally, there's no mention in the documentation of how these injected dependencies are actually wired into the pipeline or whether they're configurable via configuration files or environment variables [4]. This is an implementation detail that isn't fully discussed in the docs but becomes important for extension and runtime behavior. The pipeline uses both AST-based chunking (for code) and recursive text splitting, with each chunk enriched by an LLM before embedding. The pipeline outputs plain dataclasses (`Chunk`, `KnowledgeUnit`) to decouple processing stages [6]."
