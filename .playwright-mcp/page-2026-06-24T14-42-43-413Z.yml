          - generic [ref=e2288]: "ERPNext applies a pricing rule to an item by first identifying applicable rules based on conditions such as item code, quantity, and transaction values [5]. When a rule is found, it can either apply a discount on price or offer free items. For instance, if the rule type is \"Price,\" it sets discount fields like `discount_percentage` or `discount_amount` depending on the rule's configuration [1]. If a product discount is applied, free items may be added to the transaction via `get_product_discount_rule` which updates item details accordingly [3]. The determined discount or discount amount is then applied to the item’s rate during calculation [5]. Sources used: [1] https://erpnext.com [2] https://github.com/frappe/erpnext/blob/develop/erpnext/accounts/doctype/pricing_rule/utils.py [3] https://github.com/frappe/erpnext/blob/develop/erpnext/accounts/doctype/pricing_rule/utils.py [5] https://github.com/frappe/erpnext/blob/develop/erpnext/accounts/doctype/pricing_rule/pricing_rules.py [6] https://github.com/frappe/erpnext/blob/develop/erpnext/accounts/doctype/pricing_rule/utils.py [7] https://github.com/frappe/erpnext/blob/develop/erpnext/accounts/doctype/pricing_rule/pricing_rules.py"
